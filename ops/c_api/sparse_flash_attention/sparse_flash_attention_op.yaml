#operator sparse_flash_attention
sparse_flash_attention:
    args:
        query:
            dtype: tensor
        key:
            dtype: tensor
        value:
            dtype: tensor
        sparse_indices:
            dtype: tensor
        block_table:
            dtype: tensor
            default: None
        actual_seq_lengths_query:
            dtype: tensor
            default: None
        actual_seq_lengths_kv:
            dtype: tensor
            default: None
        query_rope:
            dtype: tensor
            default: None
        key_rope:
            dtype: tensor
            default: None
        scale_value:
            dtype: float
            default: 1.0
        sparse_block_size:
            dtype: int
            default: 1
        layout_query:
            dtype: int
            default: 0
        layout_kv:
            dtype: int
            default: 0
        sparse_mode:
            dtype: int
            default: 3
    returns:
        attention_out:
            dtype: tensor