#operator batch_matmul
batch_matmul:
  args:
    x1:
      dtype: tensor
    x2:
      dtype: tensor
    cube_math_type:
      dtype: int
      default: 0  # 0: KEEP_DTYPE, 1: ALLOW_FP32_DOWN_PRECISION, 2: USE_FP16, 3: USE_HF32
  args_signature:
    dtype_group: (x1, x2)
  returns:
    y:
      dtype: tensor

