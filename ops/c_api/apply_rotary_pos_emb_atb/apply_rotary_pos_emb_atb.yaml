#operator apply_rotary_pos_emb_atb
apply_rotary_pos_emb_atb:
    args:
        query:
            dtype: tensor
        key:
            dtype: tensor
        cos:
            dtype: tensor
        sin:
            dtype: tensor
        seq_len:
            dtype: tensor
        rotary_coeff:
            dtype: int
            default: 4
        cos_format:
            dtype: int
            default: 0
    returns:
        out_query:
            dtype: tensor
        out_key:
            dtype: tensor