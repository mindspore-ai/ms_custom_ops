#operator unpad_fa_npd
unpad_fa_npd:
  args:
    query:
      dtype: tensor
    key:
      dtype: tensor
    value:
      dtype: tensor
    attn_mask:
      dtype: tensor
      default: None
    actual_seq_qlen:
      dtype: tensor
      default: None
    actual_seq_kvlen:
      dtype: tensor
      default: None
    head_num:
      dtype: int
      default: 32
    scale_value:
      dtype: float
      default: 1.0
    q_input_layout:
      dtype: str
      default: "'TH'"
    kv_input_layout:
      dtype: str
      default: "'NPD'"
    block_size:
      dtype: int
      default: 32
  returns:
    attention_out:
      dtype: tensor
