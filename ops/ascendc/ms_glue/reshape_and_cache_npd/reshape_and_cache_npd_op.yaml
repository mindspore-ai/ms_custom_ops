#operator reshape_and_cache_npd
reshape_and_cache_npd:
  args:
    key:
      dtype: tensor
    value:
      dtype: tensor
    key_cache:
      dtype: tensor
    value_cache:
      dtype: tensor
    slot_mapping:
      dtype: tensor
    actual_seq_qlen:
      dtype: tensor
    actual_seq_kvlen:
      dtype: tensor
    block_tbl:
      dtype: tensor
    kv_cache_layout:
      dtype: str
      default: "'BNSD'"
    key_value_layout:
      dtype: str
      default: "'NPD'"
  args_signature:
    rw_write: key_cache, value_cache
    dtype_group: (key, key_cache), (value, value_cache)
  labels:
    side_effect_mem: True
  returns:
    out_key:
      dtype: tensor
    out_value:
      dtype: tensor
